server:
  port: 8888

spring:
  application:
    name: cloudconfig

  cloud:
    config:
      server:
        git:
          uri: https://github.com/Parkjungsu1/config-repo
          username: ${GIT_USERNAME}
          password: ${GIT_TOKEN}

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

management:
  endpoints:
    web:
      exposure:
        include: busrefresh,health
